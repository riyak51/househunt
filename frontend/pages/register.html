<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – HouseHunt</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav class="navbar">
  <a href="../index.html" class="logo">🏠 House<span>Hunt</span></a>
  <ul class="nav-links">
    <li><a href="../index.html">Home</a></li>
    <li><a href="listings.html">Browse Houses</a></li>
    <li><a href="login.html" class="nav-btn">Login</a></li>
  </ul>
</nav>

<div class="form-container">
  <div class="form-title">
    <h2>Create Account</h2>
    <p>Join HouseHunt and find your dream home</p>
  </div>
  <div id="alertBox" class="alert" style="display:none;"></div>
  <div class="form-group">
    <label>Full Name *</label>
    <input type="text" id="name" placeholder="Enter your full name">
  </div>
  <div class="form-group">
    <label>Email Address *</label>
    <input type="email" id="email" placeholder="Enter your email">
  </div>
  <div class="form-group">
    <label>Phone Number</label>
    <input type="tel" id="phone" placeholder="Enter your phone number">
  </div>
  <div class="form-group">
    <label>Password *</label>
    <input type="password" id="password" placeholder="Create a strong password">
  </div>
  <div class="form-group">
    <label>Confirm Password *</label>
    <input type="password" id="confirmPassword" placeholder="Re-enter your password">
  </div>
  <button class="form-submit" onclick="registerUser()">Create Account</button>
  <p class="form-link">Already have an account? <a href="login.html">Login here</a></p>
</div>

<script src="../js/auth.js"></script>
<script src="../js/api.js"></script>
<script>
  async function registerUser() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (!name || !email || !password) return showAlert('alertBox', 'Please fill all required fields');
    if (password !== confirmPassword) return showAlert('alertBox', 'Passwords do not match!');
    if (password.length < 6) return showAlert('alertBox', 'Password must be at least 6 characters');

    try {
      await Auth.register({ name, email, phone, password });
      showAlert('alertBox', '✅ Account created! Redirecting to login...', 'success');
      setTimeout(() => window.location.href = 'login.html', 2000);
    } catch (err) {
      showAlert('alertBox', err.message || 'Registration failed. Try again.');
    }
  }
</script>
</body>
</html>
