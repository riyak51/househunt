<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – HouseHunt</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav class="navbar">
  <a href="../index.html" class="logo">🏠 House<span>Hunt</span></a>
  <ul class="nav-links">
    <li><a href="../index.html">Home</a></li>
    <li><a href="listings.html">Browse Houses</a></li>
    <li><a href="register.html" class="nav-btn">Register</a></li>
  </ul>
</nav>

<div class="form-container">
  <div class="form-title">
    <h2>Welcome Back</h2>
    <p>Login to your HouseHunt account</p>
  </div>
  <div id="alertBox" class="alert" style="display:none;"></div>
  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="Enter your email">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password">
  </div>
  <button class="form-submit" onclick="loginUser()">Login</button>
  <p class="form-link">Don't have an account? <a href="register.html">Register here</a></p>
  <p class="form-link" style="margin-top:8px"><a href="admin-login.html">🔐 Admin Login</a></p>
</div>

<script src="../js/auth.js"></script>
<script src="../js/api.js"></script>
<script>
  async function loginUser() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) return showAlert('alertBox', 'Please enter email and password');

    try {
      const data = await Auth.login({ email, password });
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify({ ...data.user, role: 'user' }));
      showAlert('alertBox', '✅ Login successful! Redirecting...', 'success');
      setTimeout(() => window.location.href = '../index.html', 1500);
    } catch (err) {
      showAlert('alertBox', err.message || 'Login failed. Check your credentials.');
    }
  }

  document.addEventListener('keypress', (e) => { if (e.key === 'Enter') loginUser(); });
</script>
</body>
</html>
